  <style>
    /* Diseño de pantalla completa con estética oscura estilo Obsidian */
    body {
      margin: 0;
      padding: 0;
      background-color: transparent;
      color: #e2e8f0;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #header {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        background: rgba(15, 23, 42, 0.75);
        padding: 16px 24px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        max-width: calc(100% - 40px);
        width: 400px;
        box-sizing: border-box;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      background: linear-gradient(135deg, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 4px 0 0 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    #network-container {
        width: 100%;
        height: 100vh;
        display: block;
    }

    .filters {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 12px;
    }

    .filter-label {
        font-size: 0.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #94a3b8;
        transition: color 0.2s ease;
        user-select: none;
    }

    .filter-label:hover {
        color: #ffffff;
    }

    .filter-label input {
        cursor: pointer;
        accent-color: #3b82f6;
    }

    /* Hint Overlay (Visual guidance for scrolling) */
    .hint-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.5s ease;
        z-index: 30;
        background: rgba(0, 0, 0, 0.75);
        padding: 24px 32px;
        border-radius: 100px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 500;
        white-space: nowrap;
    }

    .hint-overlay.hidden {
        opacity: 0;
        pointer-events: none;
    }

    /* Mouse Wheel Animation */
    .mouse-icon {
        width: 24px;
        height: 36px;
        border: 2px solid #ffffff;
        border-radius: 12px;
        position: relative;
    }

    .wheel {
        width: 4px;
        height: 8px;
        background: #ffffff;
        border-radius: 2px;
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        animation: scroll 1.5s infinite;
    }

    @keyframes scroll {
        0% { top: 18px; opacity: 1; }
        100% { top: 6px; opacity: 0; }
    }

    @media (max-width: 600px) {
        #header {
            top: 15px;
            right: 15px;
            left: 15px;
            width: auto;
            max-width: none;
        }
    }
  </style>
</head>

    nodosArray.push({
      id: 'nucleo',
      label: 'NÚCLEO CENTRAL',
      size: 38,
      color: { background: '#ffffff', border: '#3b82f6' },
      font: { color: '#ffffff', size: 15, bold: true, face: 'Outfit' }
    });

    // Mapeo dinámico y asignación de estilos según jerarquías
    datosRaw.forEach(item => {
      let tamano = 10;
      let colorNodo = '#475569'; // Gris para Archivos
      let colorTexto = '#94a3b8';

      // Validación segura del tipo/nivel estructurado del JSON
      const nivel = item["Tipo"] ? item["Tipo"]["Nivel"] : "Archivo";

      if (nivel === "Carpeta Principal") {
        tamano = 24;
        colorNodo = '#3b82f6'; // Azul brillante
        colorTexto = '#f8fafc';
      } else if (nivel === "Subcarpeta") {
        tamano = 18;
        colorNodo = '#818cf8'; // Morado
        colorTexto = '#e2e8f0';
      }

      nodosArray.push({
        id: item["ID Nodo"],
        label: item["Etiqueta (Nombre)"],
        size: tamano,
        url: item["URL Drive"],
        color: { background: colorNodo, border: '#0b0f19' },
        font: { color: colorTexto, size: tamano > 10 ? 12 : 9, face: 'Outfit' }
      });

      if (item["Conecta Con (Padre)"]) {
        enlacesArray.push({
          from: item["ID Nodo"],
          to: item["Conecta Con (Padre)"]
        });
      }
    });

    // Conjuntos maestros de datos (Estructura base)
    const nodosMaestros = new vis.DataSet(nodosArray);
    const enlacesMaestros = new vis.DataSet(enlacesArray);

    // Vista filtrada interactiva conectada a los Checkboxes de tu HTML
    const nodosFiltrados = new vis.DataView(nodosMaestros, {
      filter: function (node) {
        if (node.id === 'nucleo') return true; // El núcleo nunca se oculta
        
        // Verificamos si los elementos existen en la interfaz antes de leer su estado
        const verCarpetas = document.getElementById('chk-carpetas') ? document.getElementById('chk-carpetas').checked : true;
        const verSubcarpetas = document.getElementById('chk-subcarpetas') ? document.getElementById('chk-subcarpetas').checked : true;
        const verArchivos = document.getElementById('chk-archivos') ? document.getElementById('chk-archivos').checked : true;

        if (node.size === 24) return verCarpetas;
        if (node.size === 18) return verSubcarpetas;
        if (node.size === 10) return verArchivos;
        
        return true;
      }
    });

    const container = document.getElementById('network-container');
    const data = { 
      nodes: nodosFiltrados, 
      edges: enlacesMaestros 
    };

    // Ajustes físicos calibrados para tu volumen real de nodos (+80 elementos)
    const options = {
      nodes: {
        shape: 'dot',
        font: { vadjust: 26, face: 'Outfit' }
      },
      edges: {
        color: { color: 'rgba(255, 255, 255, 0.1)', highlight: '#3b82f6' },
        width: 1.2,
        smooth: false
      },
      physics: {
        barnesHut: {
          gravitationalConstant: -5500, // Evita aglomeración de textos pesados
          centralGravity: 0.15,
          springLength: 120,
          springConstant: 0.04
        },
        stabilization: {
          iterations: 150 // Pre-renderizado suave al arrancar la pantalla
        }
      },
      interaction: { hover: true, zoomView: true, dragView: true }
    };

    const network = new vis.Network(container, data, options);

    // Función global que se activa al cambiar los estados de los filtros
    function filtrarMapa() {
      nodosFiltrados.refresh();
    }

    // Evento Click: Abre la URL de Google Drive correspondiente en pestaña nueva
    network.on("click", function (params) {
      if (params.nodes.length > 0) {
        const nodeId = params.nodes[0];
        const nodeData = nodosMaestros.get(nodeId);
        
        if (nodeData && nodeData.url && nodeData.url !== "#") {
          window.open(nodeData.url, '_blank');
        }
      }
    });

    // Control del indicador animado de la rueda del ratón (hint)
    const hintOverlay = document.getElementById('hint');
    function hideHint() {
      if (hintOverlay && !hintOverlay.classList.contains('hidden')) {
        hintOverlay.classList.add('hidden');
      }
    }
    setTimeout(hideHint, 5000); // Desvanecer en 5 segundos

    // Ocultar si el usuario empieza a interactuar
    network.on("dragStart", hideHint);
    network.on("zoom", hideHint);
    network.on("click", hideHint);
  </script>
</body>
</html>
